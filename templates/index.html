<!DOCTYPE html>
<html>
<head>
    <title>GenAI Chatbot</title>
    <style>
        body {
            font-family: Arial;
            width: 700px;
            margin: 40px auto;
        }

        #chat {
            height: 500px;
            border: 1px solid #ccc;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
        }

        .user {
            color: blue;
            margin: 8px 0;
        }

        .bot {
            color: green;
            margin: 8px 0;
        }

        input {
            width: 80%;
            padding: 10px;
        }

        button {
            padding: 10px;
        }
    </style>
</head>
<body>

<h2>GenAI Chatbot</h2>

<div id="chat"></div>

<input type="text" id="message" placeholder="Ask something..." />
<button onclick="sendMessage()">Send</button>
<button id="mic-btn" type="button">🎤</button>


<script>
const chat = document.getElementById("chat");
const input = document.getElementById("message");
const micBtn = document.getElementById("mic-btn");

function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = sender;
    div.innerHTML = `<b>${sender === "user" ? "You" : "Bot"}:</b> ${text}`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    try {
        const response = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message })
        });

        const data = await response.json();
        const botReply = data.response || data.answer || "No response";
        addMessage(botReply, "bot");
    } catch (error) {
        console.error(error);
        addMessage("Sorry, I could not process that request.", "bot");
    }
}

let recognition = null;
let isListening = false;

function initSpeechRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        micBtn.disabled = true;
        micBtn.textContent = "🎤 unavailable";
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.interimResults = false;
    recognition.continuous = false;

    recognition.onresult = (event) => {
        const transcript = event.results[event.resultIndex][0].transcript;
        input.value = transcript;
    };

    recognition.onend = () => {
        isListening = false;
        micBtn.textContent = "🎤";
    };

    recognition.onerror = (event) => {
        console.error("Speech recognition error", event.error);
        isListening = false;
        micBtn.textContent = "🎤";
    };
}

function toggleListening() {
    if (!recognition) {
        initSpeechRecognition();
    }

    if (!recognition) {
        return;
    }

    if (isListening) {
        recognition.stop();
        isListening = false;
        micBtn.textContent = "🎤";
        return;
    }

    try {
        recognition.start();
        isListening = true;
        micBtn.textContent = "⏹";
    } catch (error) {
        if (error.name === "InvalidStateError") {
            console.warn("Speech recognition is already active.");
        } else {
            console.error(error);
        }
    }
}

micBtn.addEventListener("click", toggleListening);
</script>

</body>
</html>
