<!DOCTYPE html>
<html>
<head>
    <title>GenAI Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h2>GenAI Chatbot</h2>

        <div class="disclaimer">
            <strong>Disclaimer:</strong> 👋 Welcome! Ask questions about the provided DSA.pdf document. This assistant answers using only the information available in the document.
        </div>

        <div id="chat"></div>

        <div class="input-row">
            <input type="text" id="message" placeholder="Ask something..." />
            <button onclick="sendMessage()">Send</button>
            <button id="mic-btn" type="button">🎤</button>
        </div>
    </div>


<script>
const chat = document.getElementById("chat");
const input = document.getElementById("message");
const micBtn = document.getElementById("mic-btn");

function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = `message ${sender}`;
    div.innerHTML = `<b>${sender === "user" ? "You" : "Bot"}:</b> ${text}`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function showTypingIndicator() {
    const id = "typing-" + Date.now();

    const chatWindow = document.getElementById("chat");

    const botMessage = document.createElement("div");
    botMessage.className = "bot-message";
    botMessage.id = id;

    botMessage.innerHTML = `
        <div class="typing-indicator">
            <span></span>
            <span></span>
            <span></span>
        </div>
    `;

    chatWindow.appendChild(botMessage);
    chatWindow.scrollTop = chatWindow.scrollHeight;

    return id;
}
function removeTypingIndicator(id) {
    const element = document.getElementById(id);

    if (element) {
        element.remove();
    }
}

async function sendMessage() {
    const message = input.value.trim();
    if (!message) return;

    // Display user's message
    addMessage(message, "user");
    input.value = "";

    // Create typing indicator
    const loader = document.createElement("div");
    loader.className = "message bot";
    loader.id = "typing-loader";
    loader.innerHTML = `
        <div class="typing-indicator">
            <span></span>
            <span></span>
            <span></span>
        </div>
    `;
    chat.appendChild(loader);
    chat.scrollTop = chat.scrollHeight;

    try {
        const response = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message })
        });

        const data = await response.json();
        const botReply = data.response || data.answer || "No response";

        // Remove loader
        document.getElementById("typing-loader").remove();

        // Show bot response
        addMessage(botReply, "bot");

    } catch (error) {
        console.error(error);

        // Remove loader
        document.getElementById("typing-loader").remove();

        addMessage("Sorry, I could not process that request.", "bot");
    }
}

let recognition = null;
let isListening = false;

function initSpeechRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        micBtn.disabled = true;
        micBtn.textContent = "🎤 unavailable";
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.interimResults = false;
    recognition.continuous = false;

    recognition.onresult = (event) => {
        const transcript = event.results[event.resultIndex][0].transcript;
        input.value = transcript;
    };

    recognition.onend = () => {
        isListening = false;
        micBtn.textContent = "🎤";
    };

    recognition.onerror = (event) => {
        console.error("Speech recognition error", event.error);
        isListening = false;
        micBtn.textContent = "🎤";
    };
}

function toggleListening() {
    if (!recognition) {
        initSpeechRecognition();
    }

    if (!recognition) {
        return;
    }

    if (isListening) {
        recognition.stop();
        isListening = false;
        micBtn.textContent = "🎤";
        return;
    }

    try {
        recognition.start();
        isListening = true;
        micBtn.textContent = "⏹";
    } catch (error) {
        if (error.name === "InvalidStateError") {
            console.warn("Speech recognition is already active.");
        } else {
            console.error(error);
        }
    }
}

micBtn.addEventListener("click", toggleListening);

</script>

</body>
</html>
